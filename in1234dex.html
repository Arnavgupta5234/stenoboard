<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sanjay Sir"/>
<meta name="theme-color" content="#0f1218"/>
<link rel="manifest" href='data:application/manifest+json,{"name":"English With Sanjay Sir","short_name":"Sanjay Sir","display":"fullscreen","orientation":"landscape","background_color":"%230f1218","theme_color":"%230f1218","start_url":"."}'/>
<title>English With Sanjay Sir — Classroom Presenter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1218; --surface:#161a22; --surface2:#1d222d; --card:#1a1f29;
  --border:#2a3040; --border-soft:#232837;
  --text:#edeff4; --muted:#8a90a0; --faint:#5a6070;
  --gold:#e8a33d; --gold-soft:rgba(232,163,61,.12);
  --green:#3fbf7f; --green-soft:rgba(63,191,127,.13);
  --red:#e05c5c; --red-soft:rgba(224,92,92,.12);
  --blue:#6ea8e8; --purple:#b48ae0;
  --shadow:0 8px 32px rgba(0,0,0,.45);
  --r:14px; --r-sm:9px;
  --serif:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'Noto Sans Devanagari',sans-serif;
  --fs:1;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
html[data-theme="light"]{
  --bg:#f4f2ec; --surface:#fdfcf9; --surface2:#efece3; --card:#ffffff;
  --border:#d8d3c4; --border-soft:#e5e1d4;
  --text:#1c1f26; --muted:#6b6f7c; --faint:#a0a4b0;
  --gold:#c07f14; --gold-soft:rgba(192,127,20,.11);
  --green:#1e9960; --green-soft:rgba(30,153,96,.11);
  --red:#c94444; --red-soft:rgba(201,68,68,.09);
  --blue:#3374bd; --purple:#8a5cc0;
  --shadow:0 8px 28px rgba(60,52,30,.14);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;touch-action:manipulation;overscroll-behavior:none}
button{font-family:var(--sans);color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.hidden{display:none!important}

/* ============ APP FRAME ============ */
#app{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ============ TOP BAR ============ */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;padding-top:max(8px,env(safe-area-inset-top));
  background:var(--surface);border-bottom:1px solid var(--border-soft);flex-shrink:0;z-index:60}
.brand{font-family:var(--serif);font-weight:900;font-size:17px;color:var(--gold);letter-spacing:.01em;white-space:nowrap}
.brand small{font-family:var(--sans);font-weight:600;font-size:10px;color:var(--muted);letter-spacing:.12em;
  text-transform:uppercase;display:block;margin-top:-1px}
.sp{flex:1}
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;max-width:46vw;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted);
  border:1px solid transparent;white-space:nowrap;transition:color .18s,background .18s,border-color .18s}
.tab.on{color:var(--gold);background:var(--gold-soft);border-color:var(--gold)}
.tbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--muted);background:var(--surface2);border:1px solid var(--border-soft);
  transition:transform .07s,background .15s,color .15s;flex-shrink:0}
.tbtn:active{transform:scale(.92)}
.tbtn.on{color:var(--gold);border-color:var(--gold);background:var(--gold-soft)}
.timer{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--muted);
  padding:6px 10px;border-radius:10px;background:var(--surface2);border:1px solid var(--border-soft);
  display:flex;align-items:center;gap:7px;flex-shrink:0}
.timer.run{color:var(--gold)}
.timer button{font-size:11px;color:inherit}

/* ============ STAGE ============ */
.stage{flex:1;display:flex;overflow:hidden;position:relative}

/* passage panel */
.ppanel{width:0;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border-soft);background:var(--bg);
  transition:width .38s var(--ease)}
.stage.split .ppanel{width:54%}
.stage.split.pfull .ppanel{width:100%;border-right:none}
.stage.split.pfull .qpanel{flex:0 0 0;width:0;min-width:0;overflow:hidden;border:none;opacity:0}
.qpanel{transition:opacity .3s,flex-basis .38s var(--ease)}
.stage.pfull .pinner{max-width:1050px;margin:0 auto}
.stage.pfull .ptext{font-size:calc(22px * var(--fs))}
.phead{display:flex;align-items:center;gap:8px;padding:9px 20px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.phead .lbl{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.pscroll{flex:1;overflow-y:auto;position:relative;-webkit-overflow-scrolling:touch}
.pinner{padding:26px 30px 46px;position:relative}
.ptext{font-size:calc(19px * var(--fs));line-height:1.95;font-weight:400;white-space:pre-wrap;color:var(--text)}
.ptext b{color:var(--gold);font-weight:700}

/* cloze blanks */
.blank{display:inline-block;min-width:86px;text-align:center;border-bottom:2.5px solid var(--gold);
  color:var(--gold);font-weight:700;padding:0 8px;font-size:.82em;letter-spacing:.03em;
  border-radius:4px 4px 0 0;transition:background .25s,color .25s,border-color .25s;vertical-align:baseline}
.blank.cur{background:var(--gold-soft);animation:pulse 1.6s ease-in-out infinite}
.blank.done{color:var(--green);border-color:var(--green);background:var(--green-soft);animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,163,61,0)}50%{box-shadow:0 0 0 5px var(--gold-soft)}}

/* question panel */
.qpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface);min-width:0}
.qhead{display:flex;align-items:center;gap:12px;padding:12px 26px 0;flex-shrink:0}
.qnum{font-family:var(--serif);font-weight:900;font-size:calc(30px * var(--fs));color:var(--gold);
  line-height:1;transition:color .3s}
.qnum.solved{color:var(--green)}
.qtag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.qprog{margin-left:auto;font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap}
.qscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.qbody{padding:14px 26px 40px;max-width:1060px}
.stage:not(.split) .qbody{margin:0 auto;padding:26px 48px 60px}
.qtext{font-size:calc(21px * var(--fs));line-height:1.72;font-weight:450;margin-bottom:22px;white-space:pre-wrap}
.stage:not(.split) .qtext{font-size:calc(25px * var(--fs))}
.qtext b{color:var(--gold);font-weight:700}
.qtext .dirline{display:block;font-size:.72em;font-weight:600;letter-spacing:.02em;color:var(--muted);margin-bottom:10px}
.qbody.noopts .opts,.qbody.noopts .expl{display:none}
.qbody.noopts .qtext{font-size:calc(29px * var(--fs));line-height:1.85}
.stage:not(.split) .qbody.noopts .qtext{font-size:calc(37px * var(--fs));line-height:1.75}

/* options */
.opts{display:flex;flex-direction:column;gap:11px}
.stage:not(.split) .opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.opt{display:flex;align-items:center;gap:15px;padding:15px 17px;border-radius:var(--r);
  background:var(--card);border:1.5px solid var(--border-soft);text-align:left;width:100%;
  transition:transform .14s var(--ease),border-color .18s,background .18s,box-shadow .18s;
  opacity:0;transform:translateY(14px);min-height:60px}
.opt.in{opacity:1;transform:none}
.opt:active{transform:scale(.985)}
@media(hover:hover){.opt:hover{border-color:var(--border);transform:translateY(-1px)}}
.olet{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:700;font-size:calc(18px * var(--fs));
  background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);
  transition:background .2s,color .2s,border-color .2s,transform .3s var(--spring)}
.otext{font-size:calc(18px * var(--fs));line-height:1.5;flex:1}
.stage:not(.split) .otext{font-size:calc(20px * var(--fs))}
.otext b{color:var(--gold)}
.opt.sel{border-color:var(--gold);background:var(--gold-soft)}
.opt.sel .olet{background:var(--gold);border-color:var(--gold);color:#141414}
.opt.ok{border-color:var(--green);background:var(--green-soft);animation:okpop .55s var(--spring)}
.opt.ok .olet{background:var(--green);border-color:var(--green);color:#0c130f;transform:rotate(-6deg) scale(1.08)}
.opt.bad{border-color:var(--red);background:var(--red-soft)}
.opt.bad .olet{background:var(--red);border-color:var(--red);color:#fff}
.opt.dim{opacity:.42}
@keyframes okpop{0%{transform:scale(1)}38%{transform:scale(1.033)}100%{transform:scale(1)}}
.okmark{margin-left:auto;font-size:20px;color:var(--green);opacity:0;transform:scale(.4);flex-shrink:0;
  transition:opacity .3s .12s,transform .4s .12s var(--spring)}
.opt.ok .okmark{opacity:1;transform:scale(1)}

/* explanation */
.expl{margin-top:20px;border-radius:var(--r);border:1.5px solid var(--green);background:var(--green-soft);
  overflow:hidden;max-height:0;opacity:0;transition:max-height .5s var(--ease),opacity .35s,margin .4s;
  margin-top:0;border-width:0}
.expl.show{max-height:640px;opacity:1;margin-top:20px;border-width:1.5px}
.expl-in{padding:17px 20px}
.expl-tag{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.expl-txt{font-size:calc(16.5px * var(--fs));line-height:1.8;white-space:pre-wrap}
.expl-txt b{font-weight:700;color:var(--green)}

/* ============ BOTTOM RAIL ============ */
.rail{display:flex;align-items:center;gap:12px;padding:10px 16px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border-soft);flex-shrink:0;z-index:60}
.navb{padding:12px 22px;border-radius:12px;font-size:15px;font-weight:600;color:var(--text);
  background:var(--surface2);border:1px solid var(--border-soft);transition:transform .07s,background .15s;
  white-space:nowrap;min-height:48px}
.navb:active{transform:scale(.95)}
.navb:disabled{opacity:.3;pointer-events:none}
.dots{flex:1;display:flex;gap:7px;justify-content:center;flex-wrap:wrap;max-height:44px;overflow:hidden;padding:2px}
.dot{width:11px;height:11px;border-radius:50%;background:var(--border);transition:transform .25s var(--spring),background .2s;padding:0}
.dot.done{background:var(--green)}
.dot.cur{background:var(--gold);transform:scale(1.55)}
.reveal-btn{padding:13px 34px;border-radius:13px;font-size:16px;font-weight:700;letter-spacing:.01em;
  background:var(--gold);color:#161206;border:1px solid var(--gold);min-height:50px;
  transition:transform .1s,opacity .15s,background .25s,color .25s;box-shadow:0 4px 18px rgba(232,163,61,.25)}
.reveal-btn:active{transform:scale(.95)}
.reveal-btn.done{background:var(--green-soft);color:var(--green);border-color:var(--green);box-shadow:none}

/* ============ ANNOTATION ============ */
canvas.anno{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:6}
.pinner,.qwrap{position:relative}
.qwrap{min-height:100%;padding-bottom:75vh}
.pinner{padding-bottom:55vh!important}
.scratch-hint{margin:26px 26px 0;padding-top:14px;border-top:1.5px dashed var(--border);
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);user-select:none}
.touchdraw .pscroll,.touchdraw .qscroll{touch-action:none;overflow:hidden}

.dock{position:absolute;left:12px;bottom:calc(78px + env(safe-area-inset-bottom,0px));z-index:65;display:flex;align-items:center;gap:6px;
  padding:7px 10px;border-radius:16px;background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow);transition:transform .3s var(--ease),opacity .25s;max-width:calc(100vw - 24px);flex-wrap:wrap}
.dock.min{transform:translateY(12px);opacity:0;pointer-events:none}
.dk{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);background:var(--surface2);border:1px solid var(--border-soft);
  transition:transform .07s,background .15s;padding:0}
.dk:active{transform:scale(.9)}
.dk.on{color:#141414;background:var(--gold);border-color:var(--gold)}
.dk.mode{width:auto;padding:0 12px;font-size:12px;font-weight:700;letter-spacing:.02em}
.sw{width:24px;height:24px;border-radius:50%;border:2.5px solid transparent;padding:0;transition:transform .15s}
.sw.on{border-color:var(--text);transform:scale(1.22)}
.dsep{width:1px;height:22px;background:var(--border)}
.szr{-webkit-appearance:none;appearance:none;width:66px;height:4px;border-radius:3px;background:var(--border);outline:none}
.szr::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--gold)}

/* ============ HOME ============ */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  padding:40px 24px;text-align:center;overflow-y:auto}
.home-logo{font-family:var(--serif);font-weight:900;font-size:44px;color:var(--gold);line-height:1.05}
.home-logo small{display:block;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--muted);
  letter-spacing:.22em;text-transform:uppercase;margin-top:8px}
.home-sub{font-size:14.5px;color:var(--muted);max-width:430px;line-height:1.75}
.home-acts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hbtn{padding:14px 30px;border-radius:13px;font-size:15px;font-weight:700;min-height:50px;
  transition:transform .1s}
.hbtn:active{transform:scale(.96)}
.hbtn.p{background:var(--gold);color:#161206}
.hbtn.s{border:1.5px solid var(--border);color:var(--text);background:var(--surface)}
.paste-wrap{width:min(620px,92vw);display:none;flex-direction:column;gap:10px}
.paste-wrap.on{display:flex}
.paste-wrap textarea{width:100%;height:150px;border-radius:12px;background:var(--surface);color:var(--text);
  border:1.5px solid var(--border);padding:14px;font-family:ui-monospace,monospace;font-size:12.5px;resize:vertical;outline:none}
.paste-wrap textarea:focus{border-color:var(--gold)}
.schema-hint{font-size:11.5px;color:var(--faint);background:var(--surface);border:1px solid var(--border-soft);
  border-radius:10px;padding:12px 16px;max-width:560px;text-align:left;line-height:1.8}
.schema-hint code{color:var(--gold);font-family:ui-monospace,monospace;font-size:10.5px}
.err-msg{color:var(--red);font-size:13px;font-weight:600;min-height:18px}

/* toast + kbd hint */
.toast{position:absolute;top:66px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:80;
  background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;
  padding:9px 20px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s var(--ease);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer-strip{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:10.5px;color:var(--faint);
  padding:6px;letter-spacing:.04em;pointer-events:none}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
/* narrower screens: stack split view */
@media (max-width:820px){
  .stage.split{flex-direction:column}
  .stage.split .ppanel{width:100%!important;height:44%;border-right:none;border-bottom:1px solid var(--border-soft)}
  .tabs{max-width:34vw}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ============================================================
   English With Sanjay Sir — classroom presenter for exam-prep JSON papers
   Vanilla JS · Pointer Events · iPad optimized
   ============================================================ */

const TYPE_LABELS = {
  rc:"Reading Comp", cloze:"Cloze Test", idiom:"Idioms & Phrases", ows:"One-Word Sub",
  spelling:"Spelling", correction:"Sentence Correction", improvement:"Sentence Improvement",
  narration:"Narration", voice:"Active–Passive", rearrangement:"Rearrangement",
  synonym:"Synonym", antonym:"Antonym", homonym:"Homonym", fill:"Fill Blank",
  error:"Error Spotting", mcq:"MCQ"
};

const S = {
  data:null, si:0, qi:0,
  picked:{},          // "si-qi" -> option index teacher tapped
  hideOpts:{},        // "si-qi" -> options hidden for focus view
  pfull:false,        // passage takes full width (split view)
  revealed:{},        // "si-qi" -> true
  fontScale:1,
  theme:"dark",
  penMode:"auto",           // auto | touch | off
  tool:"pen", color:"#e8a33d", size:4,
  strokes:{},         // "p{si}" / "q{si}-{qi}" -> array of stroke objects
  timer:{sec:0, on:false, id:null},
};

const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};

const $ = sel => document.querySelector(sel);
const app = document.getElementById("app");
const key = () => S.si + "-" + S.qi;
const cur = () => S.data ? S.data.sections[S.si] : null;
const curQ = () => { const s = cur(); return s ? s.questions[S.qi] : null; };

/* --- minimal safe rich text: allow only <b>,<i>,<br>, escape all else --- */
function rich(str){
  if(str == null) return "";
  let s = String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s = s.replace(/&lt;(\/?)(b|i|br)\s*\/?&gt;/gi,"<$1$2>");
  return s;
}
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._id); toast._id = setTimeout(()=>t.classList.remove("show"),1400);
}

/* ============ SESSION PERSISTENCE ============ */
let sessT = null;
function persistSession(){
  clearTimeout(sessT);
  sessT = setTimeout(()=>{
    const slim = {};
    for(const k in S.strokes){
      const arr = S.strokes[k];
      if(arr && arr.length)
        slim[k] = arr.map(st=>({tool:st.tool,color:st.color,size:st.size,
          pts:st.pts.map(p=>[Math.round(p.x*10)/10, Math.round(p.y*10)/10])}));
    }
    store.set("sb_sess", JSON.stringify({
      si:S.si, qi:S.qi, picked:S.picked, revealed:S.revealed,
      hideOpts:S.hideOpts, tsec:S.timer.sec, strokes:slim
    }));
  }, 350);
}
function restoreSession(){
  const raw = store.get("sb_sess");
  if(!raw) return false;
  try{
    const s = JSON.parse(raw);
    S.picked = s.picked||{}; S.revealed = s.revealed||{}; S.hideOpts = s.hideOpts||{};
    S.timer.sec = s.tsec||0;
    S.strokes = {};
    for(const k in (s.strokes||{}))
      S.strokes[k] = s.strokes[k].map(st=>({tool:st.tool,color:st.color,size:st.size,
        pts:st.pts.map(p=>({x:p[0],y:p[1]}))}));
    const maxSi = S.data.sections.length-1;
    S.si = Math.min(Math.max(0, s.si||0), maxSi);
    S.qi = Math.min(Math.max(0, s.qi||0), S.data.sections[S.si].questions.length-1);
    return true;
  }catch(e){ return false; }
}
window.addEventListener("pagehide", ()=>{ clearTimeout(sessT); sessT=null;
  try{ persistSession(); clearTimeout(sessT); }catch(e){} });

/* ============ VALIDATION ============ */
function validateData(d){
  if(!d || typeof d !== "object") return "Root must be an object";
  if(!Array.isArray(d.sections) || !d.sections.length) return "Missing sections[]";
  for(let i=0;i<d.sections.length;i++){
    const s = d.sections[i];
    if(!Array.isArray(s.questions) || !s.questions.length) return `Section ${i+1}: missing questions[]`;
    for(const q of s.questions){
      if(!q.question) return `Section ${i+1} Q${q.number??"?"}: missing question`;
      if(!Array.isArray(q.options) || q.options.length < 2) return `Q${q.number}: needs 2+ options`;
      if(typeof q.answer !== "number" || q.answer < 0 || q.answer >= q.options.length)
        return `Q${q.number}: answer must be 0–${q.options.length-1}`;
    }
  }
  return null;
}

/* ============ HOME SCREEN ============ */
function renderHome(errMsg){
  stopTimer();
  app.innerHTML = `
  <div class="topbar">

function loadJSON(text, silent, resume){
  let d;
  try{ d = JSON.parse(text); }
  catch(e){ return silent ? toast("Saved paper corrupt") : renderHome("Invalid JSON: "+e.message); }
  const err = validateData(d);
  if(err) return silent ? toast(err) : renderHome("Schema error — "+err);
  S.data = d; S.si = 0; S.qi = 0;
  S.picked = {}; S.revealed = {}; S.hideOpts = {}; S.strokes = {}; S.timer.sec = 0;
  if(resume) restoreSession(); else store.set("sb_sess","");
  store.set("sb_last", JSON.stringify(d));
  renderPlayer();
  if(resume) toast("Resumed where you left off");
}

function bumpFont(d){
  S.fontScale = Math.min(1.5, Math.max(.7, +(S.fontScale + d).toFixed(2)));
  document.documentElement.style.setProperty("--fs", S.fontScale);
  store.set("sb_fs", S.fontScale);
}

function tickTimer(){ S.timer.sec++; const el=$("#tval"); if(el) el.textContent = fmtT(S.timer.sec); }
function toggleTimer(){

  if(S.timer.on) S.timer.id = setInterval(tickTimer,1000);

  const b=$("#tplay"); if(b) b.textContent = S.timer.on ? "❙❙" : "▶";
}
function stopTimer(){ clearInterval(S.timer.id); S.timer.on=false; }

/* ============ QUESTION RENDER ============ */
function isSplit(){ const s=cur(); return (s.layout==="split") || (!!s.passage && s.layout!=="full"); }

function renderQuestion(sectionChanged){
  const s = cur(), q = curQ(), k = key();
  const stage = $("#stage");
  stage.classList.toggle("split", isSplit());
  syncPfull();

  // passage
  if(isSplit()){
    $("#ptitle").textContent = (s.title||"Passage") + (s.range? "  ·  "+s.range : "");
    renderPassage();
    if(sectionChanged) $("#pscroll").scrollTop = 0;
  }

  // header
  $("#qnum").textContent = "Q" + (q.number ?? (S.qi+1));
  $("#qnum").classList.toggle("solved", !!S.revealed[k]);
  $("#qtag").textContent = TYPE_LABELS[(q.type||"mcq").toLowerCase()] || (q.type||"MCQ").toUpperCase();
  $("#qprog").textContent = (S.qi+1) + " / " + s.questions.length;

  // body
  const revealed = !!S.revealed[k];
  const picked = S.picked[k];
  const useGrid = !isSplit() && (q.options||[]).every(o=>String(o).length<70) && q.options.length===4;
  const qb = $("#qbody");
  qb.innerHTML = `
    <div class="qtext">${rich(q.question)}</div>
    <div class="opts ${useGrid?"grid2":""}" id="opts">
      ${q.options.map((o,i)=>`
        <button class="opt" data-i="${i}">
          <span class="olet">${String.fromCharCode(65+i)}</span>
          <span class="otext">${rich(o)}</span>
          <span class="okmark">✔</span>
        </button>`).join("")}
    </div>
    <div class="expl" id="expl">${q.explanation?`<div class="expl-in"><div class="expl-tag">Explanation</div><div class="expl-txt">${rich(q.explanation)}</div></div>`:""}</div>`;

  const optEls = [...qb.querySelectorAll(".opt")];
  optEls.forEach((el,i)=>{
    el.onclick = ()=>pick(i);
    // stagger-in
    setTimeout(()=>el.classList.add("in"), 40 + i*55);
  });
  applyOptionState(optEls, q, picked, revealed, false);
  if(revealed && q.explanation) requestAnimationFrame(()=> $("#expl").classList.add("show"));

  // rail
  $("#prevB").disabled = (S.si===0 && S.qi===0);
  $("#nextB").disabled = (S.si===S.data.sections.length-1 && S.qi===s.questions.length-1);
  const rb = $("#revealB");
  rb.textContent = revealed ? "✔ Revealed" : "Reveal Answer";
  rb.classList.toggle("done", revealed);
  renderDots();

  $("#qscroll").scrollTop = 0;
  requestAnimationFrame(sizeCanvases);
}

function applyOptionState(optEls, q, picked, revealed, animate){
  optEls.forEach((el,i)=>{
    el.classList.remove("sel","ok","bad","dim");
    if(revealed){
      if(i===q.answer) el.classList.add("ok");
      else if(picked!=null && i===picked) el.classList.add("bad");
      else el.classList.add("dim");
    } else if(picked!=null && i===picked) el.classList.add("sel");
  });
}

function syncPfull(){
  $("#stage").classList.toggle("pfull", S.pfull && isSplit());
  const b = $("#pfullBtn");
  if(b){ b.textContent = S.pfull ? "Show question" : "Full passage"; b.classList.toggle("on", S.pfull); }
  requestAnimationFrame(sizeCanvases);
}
function togglePfull(){
  if(!isSplit()) return;
  S.pfull = !S.pfull;
  syncPfull();
}
function syncOptsBtn(){
  const hidden = !!S.hideOpts[key()];
  $("#qbody").classList.toggle("noopts", hidden);
  const b = $("#optsBtn");
  if(b){ b.textContent = hidden ? "Show options" : "Hide options"; b.classList.toggle("on", hidden); }
}
function toggleOpts(){
  const k = key();
  S.hideOpts[k] = !S.hideOpts[k];
  syncOptsBtn();
  persistSession();
}
function pick(i){
  const k = key();
  if(S.revealed[k]) return;
  S.picked[k] = (S.picked[k]===i ? undefined : i);
  persistSession();
  const q = curQ();
  applyOptionState([...document.querySelectorAll("#opts .opt")], q, S.picked[k], false, false);
}

function revealAnswer(){
  const k = key(), q = curQ();
  if(S.pfull){ S.pfull=false; syncPfull(); }
  if(S.hideOpts[k]){ S.hideOpts[k]=false; syncOptsBtn(); }
  if(S.revealed[k]){ // un-reveal (teacher mis-tap)
    S.revealed[k] = false;
    renderQuestion(false);
    persistSession();
    return;
  }
  S.revealed[k] = true;
  applyOptionState([...document.querySelectorAll("#opts .opt")], q, S.picked[k], true, true);
  $("#qnum").classList.add("solved");
  const rb = $("#revealB");
  rb.textContent = "✔ Revealed"; rb.classList.add("done");
  if(q.explanation) $("#expl").classList.add("show");
  renderDots();
  persistSession();
  fillBlank(q, true);
  const el = document.querySelector("#opts .opt.ok");
  if(el) el.scrollIntoView({block:"nearest",behavior:"smooth"});
}

/* ============ PASSAGE + CLOZE ============ */
function renderPassage(){
  const s = cur();
  let html = rich(s.passage||"");
  // {{106}} tokens -> blank spans
  html = html.replace(/\{\{(\w+)\}\}/g, (_,id)=>`<span class="blank" data-b="${id}">${id}</span>`);
  $("#ptext").innerHTML = html;
  syncBlanks();
}

function syncBlanks(){
  const s = cur();
  document.querySelectorAll(".blank").forEach(el=>{
    const id = el.dataset.b;
    const q = s.questions.find(x=>String(x.number)===id);
    const k2 = q ? S.si+"-"+s.questions.indexOf(q) : null;
    el.classList.remove("cur","done");
    if(q && S.revealed[k2]){
      el.classList.add("done");
      el.textContent = plain(q.options[q.answer]);
    } else {
      el.textContent = id;
      if(q && s.questions.indexOf(q)===S.qi) el.classList.add("cur");
    }
  });
  const curB = document.querySelector(".blank.cur");
  if(curB) curB.scrollIntoView({block:"center",behavior:"smooth"});
}
function plain(s){ return String(s).replace(/<[^>]+>/g,""); }

function fillBlank(q, animate){
  const el = document.querySelector(`.blank[data-b="${q.number}"]`);
  if(!el) return;
  el.classList.remove("cur"); el.classList.add("done");
  const word = plain(q.options[q.answer]);
  if(!animate){ el.textContent = word; return; }
  // type-in effect
  el.textContent = "";
  let i = 0;
  const id = setInterval(()=>{
    el.textContent = word.slice(0, ++i);
    if(i>=word.length) clearInterval(id);
  }, 34);
}

/* ============ NAV ============ */
function go(d){
  const s = cur();
  let si = S.si, qi = S.qi + d;
  if(qi < 0){ if(si===0) return; si--; qi = S.data.sections[si].questions.length-1; }
  else if(qi >= s.questions.length){ if(si===S.data.sections.length-1) return; si++; qi=0; }
  const sectionChanged = si!==S.si;
  S.si=si; S.qi=qi;
  S.pfull = false;
  if(sectionChanged) renderTabs();
  renderQuestion(sectionChanged);
  if(isSplit() && !sectionChanged) syncBlanks();
  persistSession();
}
function renderDots(){
  const s = cur();
  const d = $("#dots");
  d.innerHTML = s.questions.map((q,i)=>{
    const k2 = S.si+"-"+i;
    return `<button class="dot ${S.revealed[k2]?"done":""} ${i===S.qi?"cur":""}" data-i="${i}" aria-label="Q${q.number}"></button>`;
  }).join("");
  d.querySelectorAll(".dot").forEach(b=> b.onclick = ()=>{ S.qi=+b.dataset.i; renderQuestion(false); if(isSplit()) syncBlanks(); });
}

/* ============ ANNOTATION ============
   Modes: "auto"  — Apple Pencil (pointerType "pen") draws, finger scrolls & taps
          "touch" — any input draws, scrolling paused (capacitive stylus fallback)
          "off"   — nothing draws
   Strokes live in content coordinates on a canvas INSIDE each scroll area,
   so marks scroll with the text. Eraser deletes whole strokes. */
const MODES = ["auto","touch","off"];
const MODE_LABEL = {auto:"✍️ Pencil", touch:"👆 Touch", off:"🚫 Off"};

function qKey(){ return "q"+S.si+"-"+S.qi; }
function canvasFor(el){
  if(el.closest && el.closest("#pinner")) return {cv:$("#pcv"), key:"p"+S.si};
  if(el.closest && el.closest("#qwrap"))  return {cv:$("#qcv"), key:qKey()};
  return null;
}
let dpr=1, act=null; // act = {cv,key,stroke,ctx} while a pen stroke is live
let lastKey=null;

function sizeCanvases(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  [["#pcv","#pinner"],["#qcv","#qwrap"]].forEach(([c,w])=>{
    const cv=$(c), wr=$(w);
    if(!cv||!wr) return;
    const W=Math.round(wr.offsetWidth*dpr), H=Math.round(wr.offsetHeight*dpr);
    if(cv.width!==W||cv.height!==H){ cv.width=W; cv.height=H; }
  });
  redrawAll();
}
function initAnno(){
  syncModeUI();
  const ro = new ResizeObserver(()=>requestAnimationFrame(sizeCanvases));
  ro.observe($("#pinner")); ro.observe($("#qwrap"));
  requestAnimationFrame(sizeCanvases);
}
function cycleMode(){
  S.penMode = MODES[(MODES.indexOf(S.penMode)+1)%MODES.length];
  store.set("sb_mode", S.penMode);
  syncModeUI();
  toast(S.penMode==="auto" ? "Pencil draws · finger scrolls"
      : S.penMode==="touch" ? "Touch drawing — scrolling paused"
      : "Drawing off");
}
function syncModeUI(){
  const b=$("#modeBtn"); if(b) b.textContent = MODE_LABEL[S.penMode];
  document.documentElement.classList.toggle("touchdraw", S.penMode==="touch");
}
function syncDock(){
  document.querySelectorAll(".dk[data-tool]").forEach(b=> b.classList.toggle("on", b.dataset.tool===S.tool));
  document.querySelectorAll(".sw").forEach(b=> b.classList.toggle("on", b.dataset.c===S.color && S.tool!=="eraser"));
}
function wantsDraw(e){
  if(!S.data || !e.isPrimary) return false;
  if(S.penMode==="auto")  return e.pointerType==="pen";
  if(S.penMode==="touch") return true;
  return false;
}
function contentPos(cv, e){
  const r=cv.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
document.addEventListener("pointerdown", e=>{
  if(!wantsDraw(e)) return;
  const t = canvasFor(e.target);
  if(!t) return;
  e.preventDefault();
  const p = contentPos(t.cv, e);
  if(S.tool==="eraser"){ act={...t, stroke:null}; eraseAt(t, p); return; }
  const stroke = {tool:S.tool, color:S.color, size:S.size, pts:[p]};
  (S.strokes[t.key] ||= []).push(stroke);
  lastKey = t.key;
  act = {...t, stroke};
}, {passive:false});

document.addEventListener("pointermove", e=>{
  if(!act || !wantsDraw(e)) return;
  e.preventDefault();
  const evts = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  if(S.tool==="eraser" || !act.stroke){
    for(const ev of evts) eraseAt(act, contentPos(act.cv, ev));
    return;
  }
  for(const ev of evts) act.stroke.pts.push(contentPos(act.cv, ev));
  requestRedraw(act.cv, act.key);
}, {passive:false});

let rafPend = null;
function requestRedraw(cv, key){
  if(rafPend) return;
  rafPend = requestAnimationFrame(()=>{ rafPend = null; redrawCv(cv, key); });
}

["pointerup","pointercancel"].forEach(ev=> document.addEventListener(ev, ()=>{ if(act) persistSession(); act=null; }));

// stop Apple Pencil from scrolling the page in auto mode (finger untouched)
["touchstart","touchmove"].forEach(ev=> document.addEventListener(ev, e=>{
  if(S.penMode!=="auto" || !S.data) return;
  const t = e.touches[0];
  if(t && t.touchType==="stylus" && e.target.closest && e.target.closest("#stage")) e.preventDefault();
}, {passive:false}));

function strokeStyle(ctx, st){
  if(st.tool==="hl"){ ctx.lineWidth=Math.min(st.size*4,34)*dpr; ctx.strokeStyle=st.color+"59"; }
  else { ctx.lineWidth=st.size*dpr; ctx.strokeStyle=st.color; }
  ctx.globalCompositeOperation="source-over";
  ctx.lineCap="round"; ctx.lineJoin="round";
}
function paintStroke(cv, st, fromIdx){
  const ctx = cv.getContext("2d");
  strokeStyle(ctx, st);
  const pts = st.pts, s0 = Math.max(0, fromIdx||0);
  ctx.beginPath();
  ctx.moveTo(pts[s0].x*dpr, pts[s0].y*dpr);
  if(pts.length===1) ctx.lineTo(pts[s0].x*dpr+0.1, pts[s0].y*dpr);
  for(let i=s0+1;i<pts.length;i++) ctx.lineTo(pts[i].x*dpr, pts[i].y*dpr);
  ctx.stroke();
}
function redrawCv(cv, key){
  if(!cv) return;
  const ctx = cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  (S.strokes[key]||[]).forEach(st=>paintStroke(cv, st, 0));
}
function redrawAll(){
  redrawCv($("#pcv"), "p"+S.si);
  redrawCv($("#qcv"), qKey());
}
function eraseAt(t, p){
  const arr = S.strokes[t.key]; if(!arr || !arr.length) return;
  const R = Math.max(14, S.size*4);
  let removed = false;
  for(let i=arr.length-1;i>=0;i--){
    if(arr[i].pts.some(q=>{const dx=q.x-p.x, dy=q.y-p.y; return dx*dx+dy*dy < R*R;})){
      arr.splice(i,1); removed = true;
    }
  }
  if(removed){ redrawCv(t.cv, t.key); persistSession(); }
}
function undoStroke(){
  const key = lastKey || qKey();
  const arr = S.strokes[key];
  if(arr && arr.length){ arr.pop(); }
  else { const p=S.strokes["p"+S.si]; if(p&&p.length) p.pop(); }
  redrawAll();
  persistSession();
}

/* ============ KEYBOARD ============ */
window.addEventListener("keydown", e=>{
  if(!S.data || e.target.tagName==="TEXTAREA" || e.target.tagName==="INPUT") return;
  if(e.key==="ArrowRight"){ go(1); }
  else if(e.key==="ArrowLeft"){ go(-1); }
  else if(e.key==="r" || e.key==="R" || e.key===" "){ e.preventDefault(); revealAnswer(); }
  else if(e.key==="d" || e.key==="D"){ cycleMode(); }
  else if(e.key==="z" || e.key==="Z"){ undoStroke(); }
  else if(e.key==="o" || e.key==="O"){ toggleOpts(); }
  else if(e.key==="f" || e.key==="F"){ togglePfull(); }
  else if(/^[1-4]$/.test(e.key)){ pick(+e.key-1); }
  else if(/^[a-dA-D]$/.test(e.key)){ pick(e.key.toLowerCase().charCodeAt(0)-97); }
});

/* ============ SWIPE NAV (when not drawing) ============ */
(function(){
  let sx=null, sy=null, st=0;
  document.addEventListener("pointerdown", e=>{
    if(!S.data || S.penMode==="touch" || e.pointerType==="pen") return;
    if(e.target.closest(".opt,.rail,.topbar,.draw-dock")) { sx=null; return; }
    sx=e.clientX; sy=e.clientY; st=Date.now();
  }, {passive:true});
  document.addEventListener("pointerup", e=>{
    if(sx==null || !S.data || e.pointerType==="pen") return;
    const dx=e.clientX-sx, dy=e.clientY-sy, dt=Date.now()-st;
    sx=null;
    if(dt<450 && Math.abs(dx)>72 && Math.abs(dy)<46) go(dx<0?1:-1);
  }, {passive:true});
})();

/* ============ INIT ============ */
(function init(){
  const th = store.get("sb_theme"); if(th) S.theme = th;
  applyTheme();
  const fs = parseFloat(store.get("sb_fs")); 
  if(fs && fs>=.7 && fs<=1.5){ S.fontScale=fs; document.documentElement.style.setProperty("--fs",fs); }
  const pm = store.get("sb_mode"); if(MODES.includes(pm)) S.penMode = pm;
  const saved = store.get("sb_last");
  if(saved && saved.length > 2){ loadJSON(saved, true, true); }
  else renderHome();
})();
</script>
